on: [push, pull_request]

name: Continuous integration

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10
  CARGO: cargo

jobs:
  test:
    name: Test
    strategy:
      matrix:
        toolchain:
          - stable
          - 1.89 # MSRV
        target:
          - i686-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - i686-pc-windows-msvc
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        include:
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal --target ${{ matrix.target }} --component clippy --no-self-update
          rustup default ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup | Install cross [Linux]
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@fa0dd4cd0a40696e6f9766370614a5ce482e6aa8 # v2.77.5
        with:
          tool: cross

      - name: Setup | Use cross [Linux]
        if: matrix.os == 'ubuntu-latest'
        run: echo "CARGO=cross" >> $GITHUB_ENV

      - name: Build
        run: ${{ env.CARGO }} build --target ${{ matrix.target }} --all-features --all-targets

      - name: Run tests
        run: ${{ env.CARGO }} test --target ${{ matrix.target }} --all-features --all-targets

      - name: Run clippy
        if: matrix.toolchain == 'stable'
        run: ${{ env.CARGO }} clippy --target ${{ matrix.target }} -- -D clippy::all

  build_only:
    name: Test [Build only]
    strategy:
      matrix:
        toolchain:
          - stable
          - 1.89 # MSRV
        target:
          - x86_64-unknown-freebsd
          - x86_64-unknown-netbsd
        include:
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
          - target: x86_64-unknown-netbsd
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal --target ${{ matrix.target }} --component clippy --no-self-update
          rustup default ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup | Install cross [Linux]
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@fa0dd4cd0a40696e6f9766370614a5ce482e6aa8 # v2.77.5
        with:
          tool: cross

      - name: Setup | Use cross [Linux]
        if: matrix.os == 'ubuntu-latest'
        run: echo "CARGO=cross" >> $GITHUB_ENV

      - name: Build
        run: ${{ env.CARGO }} build --target ${{ matrix.target }} --all-features --all-targets

      - name: Run clippy
        if: matrix.toolchain == 'stable'
        run: ${{ env.CARGO }} clippy --target ${{ matrix.target }} -- -D clippy::all

  rustfmt:
    name: Rustfmt [Formatter]
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup | Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --no-self-update
          rustup default stable

      - name: Build | Format
        run: cargo fmt --all -- --check
